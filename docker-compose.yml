services:
  db:
    image: postgres:15
    container_name: etl_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: etl_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  etl_service:
    build: ./etl_service
    container_name: etl_service
    ports:
      - "8000:8000"
    depends_on:
      - db

  rag_service:
    build: ./rag_service
    container_name: rag_service
    ports:
      - "8001:8000"
    depends_on:
      - db
  
  ui_service:
    build: ./ui_service
    container_name: ui_service
    ports:
      - "8501:8501"
    depends_on:
      - etl_service
      - rag_service

volumes:
  postgres_data: